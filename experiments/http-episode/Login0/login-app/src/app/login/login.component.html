<h2>Login Form</h2>

<form name="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="imgcontainer">
      <img src="https://img1.baidu.com/it/u=2849569147,821015927&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=500" alt="Avatar" class="avatar">
    </div>
  
    <div class="container">
      <label for="uname"><b>Username</b></label>
      <input class="form-control" type="email" id="emailaddress"
      placeholder="Enter Username" formControlName="email" required>      
  
      <label for="psw"><b>Password</b></label>
      <input type="password" id="password" class="form-control"
      placeholder="Enter Password" formControlName="password" required
      minlength="4">          

      <button type="submit">Login</button>
      <label>
        <input type="checkbox" checked="checked" name="remember"> Remember me
      </label>
    </div>
  
    <div class="container" style="background-color:#f1f1f1">
      <button type="button" class="cancelbtn">Cancel</button>
      <span class="psw">Forgot <a href="#">password?</a></span>
    </div>
  </form>
