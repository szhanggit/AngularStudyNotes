<p>student works!</p>
<button (click)="getGoodStudents()">Log all of the good students</button>
<div>The total number is: {{total$ | async}}</div>
<table class="table table-striped table-centered mt-2">
    <thead>
        <tr>
            <th scope="col">First Name</th>
            <th scope="col">Last Name</th>
            <th scope="col">Gender</th>
            <th scope="col">Grade</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let student of students$ | async; index as i">
            <td>
                {{ student.firstName }}
            </td>
            <td>
                {{ student.lastName }}
            </td>
            <td>
                {{ student.gender }}
            </td>
            <td>
                {{ student.grade }}
            </td>
            <td>
                <button (click)="setStudentStatus(i)">Update Status</button>
            </td>
        </tr>
    </tbody>
</table>
