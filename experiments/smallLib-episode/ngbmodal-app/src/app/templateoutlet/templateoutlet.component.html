            <div>Not Loading</div>
        </ng-template>
  
    </div>

<ng-template #personalInfoModal let-modal>
  <div class="modal-header">
    <h4 class="modal-title" id="modalLabel">Personal information</h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')">
    </button>
  </div>
  <div class="modal-body">
    <div class="row mt-1">
      <div class="col-12">
        <div class="d-flex justify-content-center">
          <h5>{{modalModel.name}}</h5>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <div class="d-flex justify-content-center">
          <h5>{{modalModel.email}}</h5>
        </div>
      </div>
    </div>
    <dl class="row mt-1">
      <dt class="col-3">Account name</dt>
      <dd class="col-9">{{modalModel.userName}}</dd>
      <dt class="col-3">Business units</dt>
      <dd class="col-9">{{modalModel.tenant}}</dd>
      <dt class="col-3">Application</dt>
      <dd class="col-9">{{modalModel.application}}</dd>
    </dl>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-primary" (click)="modal.close('Close click')">OK</button>
  </div>
</ng-template>
