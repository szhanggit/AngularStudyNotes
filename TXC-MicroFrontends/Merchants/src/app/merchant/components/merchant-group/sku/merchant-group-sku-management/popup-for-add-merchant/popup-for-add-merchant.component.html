<div class="modal-body">
    <div class="container">
        <div class="row">
            <span class="font-18 text-dark bold text-center">
                Select which merchant to add cost
            </span>
        </div>
        <div class="row mt-3 mx-4">
            <select class="form-select margin-auto " [(ngModel)]="selectedMerchant" >
                <option [value]="merchant.merchantId" *ngFor="let merchant of merchantList">{{ merchant.name }}</option>
            </select>
        </div>
        <div class="row mt-3 mx-3">
            <div class="col-6 px-3">
                <button class="btn btn-secondary font-12 w-100 rounded-pill" (click)="activeModal.close('cancel')">
                    Cancel
                </button>
            </div>
            <div class="col-6 px-3">
                <button class="btn btn-primary font-12 w-100 rounded-pill" (click)="activeModal.close(selectedMerchant)">
                    OK
                </button>
            </div>
        </div>
    </div>
</div>
