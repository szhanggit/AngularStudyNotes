<div>
    <div class="modal-header border-0 pb-3">
        <div class="fs-4 fw-bolder text-dark text-center w-100 mt-2 mb-0">
            {{ modalInfo.title }}
        </div>
    </div>
    <div class="modal-body my-0 py-0 mx-3">
        
        <div class="search border rounded-3">
            <div class="icon">
                <span class="fs-3">
                    <i class="mdi mdi-magnify"></i>
                </span>
            </div>
            <div class="search-box">
                <input #searchBox type="text" class="form-control border-0 px-0" id="searchTextbox" placeholder="Search"
                    [(ngModel)]="searchTerm"
                    [placeholder]=" 'Search ' + ViewItemType[modalInfo.itemType] ">
            </div>
            <div class="icon" [hidden]="(this.searchTerm.length === 0)" (click)="clearSearchTerm()">
                <span class="fs-3">
                    <i class="mdi mdi-close"></i>
                </span>
            </div>
        </div>

        <div class="row mt-2 pb-2" >
            <div class="col-12 fs-5 fw-normal lh-base">
                <label class="form-check-label fs-5 text-dark fw-bolder" >
                    Total {{ ViewItemType[modalInfo.itemType] }} amount: {{ pageInfo.total }} {{ ViewItemType[modalInfo.itemType] }}(s)
                </label>
            </div>
        </div>

        <div class="row list-padding" >
            <ng-template [ngIf]="modalInfo.itemType === ViewItemType.shop" [ngIfElse]="headerProducts">
                <div class="col-12 fs-5 lh-base ">
                    <label class="table-header " >
                        Shop name 
                    </label>
                </div>
            </ng-template>

            <ng-template #headerProducts>
                <div class="col-6 fs-5 fw-normal lh-base">
                    <label class="table-header" >
                        Product name 
                    </label>
                </div>
                <div class="col-6 fs-5 fw-normal lh-base">
                    <label class="table-header" >
                        Product code
                    </label>
                </div>
            </ng-template>
        </div>

        <ng-template [ngTemplateOutlet]="viewItems"></ng-template>

    </div>
    <div class="modal-footer my-0 modal-footer">
        <button type="button" class="btn btn-secondary rounded-4 fs-5" (click)="closeModal()">Close</button>
    </div>
</div>

<ng-template #viewItems>
    <ngx-simplebar class="item-list">
        <div *ngFor="let item of itemList | async">
            <div class="row py-2 border-top list-padding" >

                <ng-template [ngIf]="modalInfo.itemType === ViewItemType.shop" [ngIfElse]="viewProducts">
                    <div class="col-12 fs-5 fw-normal lh-base ">
                        <label class="form-check-label text-dark fw-bolder">
                            {{ item.name }}
                            <span class="fs-5 fw-light">
                                ({{ item.status | shopStatusType }}, {{item.code}})
                            </span>
                        </label>
                    </div>
                </ng-template>

                <ng-template #viewProducts>
                    <div class="col-6 fs-5 fw-normal lh-base">
                        <label class="form-check-label fw-bolder text-primary clickable" (click)="navigateToProduct(item.id)">
                            {{ item.name }}
                        </label>
                    </div>
                    <div class="col-6 fs-5 fw-normal lh-base">
                        <label class="form-check-label text-dark fw-bolder">
                            {{ item.code }}
                        </label>
                    </div>
                </ng-template>

            </div>
        </div>
    </ngx-simplebar>
</ng-template>
