<div class="bg-white rounded-3 px-3 py-2 my-2">
    <div class="row">
        <div class="col-6">
            <button class="btn rounded-circle btn-sm"
                [class]="merchantDetailsCollapsed ? 'btn-light' : 'btn-secondary'" (click)="mdCollapse.toggle()"
                [attr.aria-expanded]="!merchantDetailsCollapsed" aria-controls="collapseExample">
                <i [class]="merchantDetailsCollapsed ? 'uil-angle-down' : 'uil-angle-up'"></i>
            </button>
            <span class="text-dark collapse-title font-16 m-2">
                <strong>Merchant details</strong>
            </span>

        </div>
        <div class="col-6" *ngIf="isMerchantEditor">
            <div class="float-end">
                <button class="btn btn-primary font-12 px-4" (click)="navigateToEditMerchantGroup()">
                    Edit</button>
            </div>
        </div>
    </div>
    <div #mdCollapse="ngbCollapse" class="mt-2" [(ngbCollapse)]="merchantDetailsCollapsed">
        <div class="row">
            <div class="col-12 pl-0 fs-5 fw-bold">
                Basic info
            </div>
        </div>
        <div class="row mt-1 mb-1">
            <div class="row">
                <div class="col-3">
                    Merchant group name
                </div>
                <div class="col-8 fw-bold">
                    {{merchantGroup.name}}
                </div>
            </div>
        </div>
        <div class="row" *ngFor="let merchantMaps of merchantGroup.merchantGroupMerchantMaps; index as i">
            <div class="row" *ngIf="i < 10">
                <div class="col-3">
                    <span *ngIf="i === 0">
                        Available merchants
                    </span>
                </div>
                <div class="col-8">
                    {{merchantMaps.merchant?.name}}
                </div>
            </div>
            <div class="row" *ngIf="i >= 10" #mdCollapse="ngbCollapse"
                [(ngbCollapse)]="merchantDetailsViewAllCollapsed">
                <div class="col-3">
                </div>
                <div class="col-8">
                    {{merchantMaps.merchant?.name}}
                </div>
            </div>
        </div>
        <div class="row" (click)="merchantDetailsViewAllCollapsed = !merchantDetailsViewAllCollapsed"
            *ngIf="merchantCount > 10">
            <div class="col-12 text-center cursor-pointer">
                <span class="fs-4">
                    <i
                        [class]="merchantDetailsViewAllCollapsed ? 'mdi mdi-chevron-down' : 'mdi mdi-chevron-up'"></i>
                </span>
                VIEW ALL ({{merchantCount}})
            </div>
        </div>
    </div>
</div>
