<div>
    <div class="modal-header border-0 pb-3">
        <div class="fs-4 fw-bolder text-dark text-center w-100 mt-2 mb-0">
            {{ shopModalInfo.title }}
        </div>
    </div>
    <div class="modal-body my-0 py-0 mx-3">
        <div class="search border rounded-3">
            <div class="icon">
                <span class="fs-3">
                    <i class="mdi mdi-magnify"></i>
                </span>
            </div>
            <div class="search-box">
                <input type="text" class="form-control border-0 px-0" id="searchTextbox" placeholder="Search"
                    [(ngModel)]="searchTerm" (ngModelChange)="search()" placeholder="Search shops">
            </div>
            <div class="icon" [hidden]="(this.searchTerm.length === 0)" (click)="clearSearchTerm()">
                <span class="fs-3">
                    <i class="mdi mdi-close"></i>
                </span>
            </div>
        </div>
        <div class="row mt-2 pb-2" *ngIf="shopModalInfo.mode !== 0 else viewShopCount"
            [hidden]="!(this.searchTerm.length === 0)">
            <div class="col-12 fs-5 fw-normal lh-base">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="flexCheckAll" [(ngModel)]="isAllSelected"
                        (ngModelChange)="tickSelectAll()">
                    <label class="form-check-label fs-5 px-1 fw-light" for="flexCheckAll">
                        Shop name (Total: {{ shopOptions.length }})
                    </label>
                </div>
            </div>
        </div>
        <div *ngIf="shopModalInfo.mode !== 0 else viewShops">
            <ngx-simplebar #shopList class="shop-list">
                <div *ngFor="let shop of shopOptionsCollection">
                    <div class="row py-2 border-top" [hidden]="!shop.isVisible">
                        <div class="col-12 fs-5 fw-normal lh-base">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" [(ngModel)]="shop.isSelected"
                                    (ngModelChange)="updateTotalCount()" [id]="shop.shopId">
                                <label class="form-check-label text-dark fw-bolder px-1" [for]="shop.shopId">
                                    <span class="new-shop fs-6 fw-light text-center text-white" *ngIf="showNew(shop)">
                                        New
                                    </span>
                                    {{ shop.shopName }}
                                    <span class="fs-5 fw-light">
                                        ({{ shop.shopStatus | shopStatusType }}, {{shop.identityCode}})
                                    </span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </ngx-simplebar>
        </div>
    </div>
    <div class="modal-footer my-0 modal-footer">
        <button type="button" class="btn btn-secondary rounded-4 fs-5" (click)="closeModal()">Close</button>
        <button type="button" class="btn btn-primary rounded-4 fs-5" (click)="passBack()" [disabled]="isConfirmDisabled"
            *ngIf="shopModalInfo.mode !== 0">
            Select ({{totalCount}}/{{shopOptions.length}})
        </button>
    </div>
</div>

<ng-template #viewShops>
    <ngx-simplebar class="shop-list">
        <div *ngFor="let shop of shopOptions">
            <div class="row py-2 border-top" [hidden]="!shop.isVisible">
                <div class="col-12 fs-5 fw-normal lh-base">
                    <label class="form-check-label text-dark fw-bolder" [for]="shop.shopId">
                        {{ shop.shopName }}
                        <span class="fs-5 fw-light">
                            ({{ shop.shopStatus | shopStatusType }}, {{shop.identityCode}})
                        </span>
                    </label>
                </div>
            </div>
        </div>
    </ngx-simplebar>
</ng-template>

<ng-template #viewShopCount>
    <div class="row mt-2 pb-2">
        <div class="col-12 fs-5 fw-normal lh-base">
            <label class="form-check-label fs-5 text-dark fw-bolder" for="flexCheckAll">
                Total shop amount: {{ shopOptions.length }} shop(s)
            </label>
        </div>
    </div>
</ng-template>
