<div class="cssrefresher-container" [hidden]="!isTokenExpried">
    <div class="cssrefresher-modal">
        <div class="container p-3">
            <div class="row">
                <span class="font-18 text-dark bold text-center">
                    {{ TITLE }}
                </span>
            </div>
            <div class="row mt-2">
                <span class="text-secondary font-14 text-center">
                    {{ DESCRIPTION }}
                </span>
            </div>
            <div class="row mt-3 justify-content-center">
                <div class="col-6 px-3">
                    <button class="btn btn-primary font-12 w-100 rounded-pill" (click)="login()">
                        {{ BUTTON_TEXT }}
                    </button>
                </div>
            </div>
            <div class="row mt-2 justify-content-center">
                <div #iframeContainer class="col-12"></div>
            </div>
        </div>
    </div>
</div>
