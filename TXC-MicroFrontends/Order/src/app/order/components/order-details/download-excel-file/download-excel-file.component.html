<div class="modal-body mt-2">
  <div class="row">
    <span class="text-center text-dark font-18 bold">
      Download the excel file
    </span>
  </div>
  <div class="row mt-3 m-2 text-secondary font-14">
    <div class="row mb-1">
      <div class="col-12">
        <app-form
          [formModel]="downloadExcelFileFormModel"
          [hideTitle]="true"
        ></app-form>
      </div>
    </div>
    <div class="row mt-2">
      <div class="col-1"></div>
      <div class="col-5">
        <button
          class="btn btn-secondary rounded-pill w-100 p-1 font-12"
          (click)="onButtonClicked()"
        >
          Cancel
        </button>
      </div>
      <div class="col-5">
        <button
          class="btn btn-primary rounded-pill w-100 p-1 font-12"
          (click)="onButtonClicked(true)"
        >
          Download
        </button>
      </div>
    </div>
  </div>
</div>
<ngbd-toast-global></ngbd-toast-global>
