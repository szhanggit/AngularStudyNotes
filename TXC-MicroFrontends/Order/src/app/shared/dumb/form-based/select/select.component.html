<div class="row">
    <div class="col-12" >
      <label class="form-label" [for]="selectModel.formControlName">{{ selectModel.label }}
        <span *ngIf="selectModel.required" class="text-danger">*</span></label>
      <select2
        [data]="selectModel.select2Data"
        [name]="selectModel.formControlName" ngDefaultControl
        [(ngModel)]="value"
        [id]="selectModel.formControlName"
        [class]="{'invalid-input': controlDir.control?.dirty && !controlDir.control?.valid }"
        (focus)="firstLoad = false" (update)="onSelectUpdate($any($event).value)"
        (blur)="onTouched(); blur.emit();" [disabled]="disabled"
        [placeholder]="selectModel.placeholder ?? ''"
        displaySearchStatus="hidden"
        resultMaxHeight="500px">
      </select2>
      <div *ngIf="controlDir.control?.dirty && !controlDir.control?.valid">
        <ng-container *ngFor="let errorKey of controlErrors; let index = index">
            <small class="text-danger">
                {{ errorMessages[errorKey] }}
            </small>
        </ng-container>
    </div>
    </div>
  </div>
