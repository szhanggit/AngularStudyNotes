<div class="modal-body mt-2">
  <div class="row">
    <span class="text-center text-dark font-18 bold">
      Trust account information
    </span>
  </div>
  <div class="px-3">
    <app-product-details
      [product]="product"
    ></app-product-details>
  </div>
  <div class="mx-2">
    <app-trust-account-form
      [trustAccountFormGroup]="trustAccountFormGroup"
      [editMode]="true"
      [isMVP]="!disableEditOnTrustAccount"
    ></app-trust-account-form>
  </div>
  <div class="row my-3">
    <div
      [class]="{
        'col-4': !disableEditOnTrustAccount,
        'col-5': disableEditOnTrustAccount
      }"
    ></div>
    <div class="col-2">
      <button
        class="btn btn-secondary rounded-pill w-100 p-1 font-12"
        (click)="onButtonClicked()"
      >
        {{ disableEditOnTrustAccount ? "Close" : "Cancel" }}
      </button>
    </div>
    <div class="col-2" *ngIf="!disableEditOnTrustAccount">
      <button
        class="btn btn-primary rounded-pill w-100 p-1 font-12"
        (click)="onButtonClicked(true)"
        [disabled]="
          !trustAccountFormGroup.dirty || !trustAccountFormGroup.valid
        "
      >
        Save
      </button>
    </div>
  </div>
</div>
<ngbd-toast-global></ngbd-toast-global>
