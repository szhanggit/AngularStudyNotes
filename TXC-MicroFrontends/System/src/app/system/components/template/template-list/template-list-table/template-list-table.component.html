<section class="template-list-table">
    <div class="table-responsive" *ngIf="templateList">
        <table class="table table-striped table-centered mt-2">
            <thead>
                <tr>
                    <th scope="col">Template Name</th>
                    <th scope="col">Type</th>
                    <th scope="col">Description</th>
                    <th scope="col">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let template of templateList; index as i">
                    <td scope="row" class="text-primary cursor-pointer word-break">
                        <a href="javascript:void(0)">{{ template.templateName }}</a>
                    </td>
                    <td>{{ template.type | templatesubtype }}</td>
                    <td>{{ template.description }}</td>
                    <td>
                        <button class="btn btn-secondary px-3">Preview</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
