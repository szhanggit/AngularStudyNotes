<div class="modal-header border-0 pb-3">
    <div class="fs-4 fw-bolder text-dark text-center w-100 mt-2 mb-0">
        Select flexible expiry condition
    </div>
</div>

<div class="modal-body font-14 mb-3 py-0 mx-3">
    <div class="mb-3 position-relative">
        <div class="row mb-3">
            <div class="col-6">
                <select name="filter" class="form-select font-12" [(ngModel)]="selectedTypeFilter">
                    <option selected value="0">All expiry date type</option>
                    <option *ngFor="let item of expirySchemeFlexibleTypeFilter" [value]="item">
                        {{ ExpirationPolicyTypeEnum[item] | stringSplitByCapitalLetter }}
                    </option>
                </select>
            </div>
        </div>

        <div class="row font-12 text-left pb-2">
            <div class="col-1 text-center font-14">
                <input type="checkbox" class="form-check-input" [(ngModel)]="toggleCheckboxStatus"
                    (ngModelChange)="toggleCheckboxes(toggleCheckboxStatus)">
            </div>
            <div class="col-5">
                <strong>Expiry Date Type</strong>
            </div>
            <div class="col-6">
                <strong>Expiry Condition</strong>
            </div>
        </div>
        <ng-container>
            <ngx-simplebar class="item-list">
                <div
                    *ngFor="let item of expirySchemeList; let index = index">
                    <div *ngIf="item.displayed" class="row border-top text-left py-2">
                        <div class="col-1 text-center">
                            <input type="checkbox" class="form-check-input" [checked]="item.checked" #checkbox
                                (change)="item.checked = checkbox.checked; toggleCheckbox(checkbox.checked)">
                        </div>
                        <div class="col-5">
                            {{ ExpirationPolicyTypeEnum[item.type] | stringSplitByCapitalLetter }}
                        </div>
                        <div class="col-6">
                            {{ item.displayName }}
                        </div>
                    </div>
                </div>
            </ngx-simplebar>
        </ng-container>
    </div>

    <div class="row">
        <div class="text-center">
            <button type="button" class="btn btn-secondary rounded-pill font-12 px-3"
                (click)="onCancel()">Cancel</button>
            <button type="button" class="btn btn-primary rounded-pill font-12 mx-2 px-3"
                (click)="onConfirm()">
                Confirm ({{ selectedExpiryCount }})
            </button>
        </div>
    </div>
</div>
