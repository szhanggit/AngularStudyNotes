<ngb-toast
    *ngFor="let toast of toastService.toasts"
    [class]="toast.options?.classname"
    [autohide]="true"
    [delay]="toast.options?.delay || 5000"
    (hidden)="toastService.remove(toast)"
>

    <ng-template [ngIf]="isTemplate(toast)" [ngIfElse]="text">
        <ng-template [ngTemplateOutlet]="getTemplate(toast)"></ng-template>
    </ng-template>

    <!-- Use default template if toast is text -->
    <ng-template #text>

        <ng-template [ngIf]="toast.type === ToastType.Success" [ngIfElse]="danger">
            <ng-template [ngTemplateOutlet]="success"></ng-template>
        </ng-template>
    
        <ng-template #success>
            <div class="row">
                <div class="col toast-layout">
                    <div> <i class="fs-3 uil-check-circle toast-icon toast-content"></i> </div>
                    <div class="toast-content toast-text"> {{ toast.message }} </div> 
                    <div> <button type="button" class="btn-close btn-close-grey" (click)="closeToast(toast)"></button> </div>
                </div>
            </div>
        </ng-template>
    
        <ng-template #danger>
            <div  class="row">
                <div class="col toast-layout">
                    <div> <i class="fs-3 uil-times-circle toast-icon toast-content"></i> </div>
                    <div class="toast-content toast-text"> {{ toast.message }} </div> 
                    <div> <button type="button" class="btn-close btn-close-white" (click)="closeToast(toast)"></button> </div>
                </div>
            </div>
        </ng-template>

    </ng-template>

</ngb-toast>
