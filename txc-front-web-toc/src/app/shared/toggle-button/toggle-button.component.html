<div class="toogle-container" (click)="onClick()">
    <!-- <input type="checkbox" id="toggle-button-checkbox"[checked]="checked" (change)="changed.emit($event.target.checked)"> -->
    <input type="checkbox" id="toggle-button-checkbox"[checked]="checked" >
    <label class="toggle-button-switch" for="toggle-button-checkbox"></label>
    <div class="toggle-button-text">
        <div class="toggle-button-text-on"></div>
        <div class="toggle-button-text-off"></div>
    </div>
</div>
