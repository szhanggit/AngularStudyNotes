<form id="form-container" class="needs-validation was-validated" [ngClass]="{'was-validated': isFormInvalid}" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="modal-header">
        <h4 class="modal-title text-center w-100">Provide Reject Reason</h4>
        <!-- <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss('Cross click')"></button> -->
      </div>
      <div class="modal-body">
        <!-- <div class="row">
            <div class="col-xl-12 col-lg-12 col-sm-12">
                <div class="mb-3">
                    <h6>Reject reason</h6>
                </div>                        
            </div>
        </div> -->
        <div class="row">
            <div class="col-xl-12 col-lg-12 col-sm-12">
        <div class="mb-3">
            <label for="txtReason" class="form-label">Reject Reason <span class="text-danger"><strong>*</strong></span></label>
            <!-- <input type="text" id="txtmerchantSKUName" class="form-control" formControlName="merchantSKUName" required> -->
            <textarea id="txtReason" class="form-control" formControlName="reason" required rows="5"></textarea>
        </div>
            </div>
        </div>
      </div>
      <div class="modal-footer">
        <div class="row w-100">
            <div class="col-xl-6 col-lg-6 col-sm-6">
                <button type="button" class="btn btn-light rounded-pill w-100" (click)="activeModal.close('Close click')">Cancel</button>
            </div>
            <div class="col-xl-6 col-lg-6 col-sm-6">
                <button type="button" class="btn btn-primary rounded-pill w-100" type="submit">Submit</button>
            </div>
        </div>
      </div>
    </form>
