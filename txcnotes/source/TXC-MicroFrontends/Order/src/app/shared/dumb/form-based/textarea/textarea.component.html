<div class="row">
  <div class="col-12">
    <label
    class="form-label"
      [for]="textAreaModel.formControlName"
      *ngIf="!textAreaModel.hideLabel"
      >{{ textAreaModel.label }}
      <span *ngIf="textAreaModel.required" class="text-danger">*</span></label
    >
    <textarea
      type="text"
      class="form-control font-14"
      style="resize: none"
      [(ngModel)]="value"
      [id]="textAreaModel.formControlName"
      [class]="{
        'invalid-input':
          controlDir.control?.dirty && !controlDir.control?.valid
      }"
      (input)="onChange($any($event.target).value)"
      (blur)="onTouched(); blur.emit()"
      [disabled]="disabled"
      [rows]="textAreaModel.rows ?? 10"
      [placeholder]="textAreaModel.placeholder ?? ''"
    ></textarea>
    <div *ngIf="controlDir.control?.dirty && !controlDir.control?.valid">
      <ng-container *ngFor="let errorKey of controlErrors; let index = index">
        <small class="text-danger">
          {{ errorMessages[errorKey] }}
        </small>
      </ng-container>
    </div>
  </div>
</div>
