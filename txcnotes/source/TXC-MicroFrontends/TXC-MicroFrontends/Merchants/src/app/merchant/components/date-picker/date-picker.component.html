<form class="row row-cols-sm-auto">
    <div class="col-12">
        <div class="dp-hidden position-absolute">
            <div class="input-group">
                <input name="datepicker" class="form-control" ngbDatepicker #datepicker="ngbDatepicker"
                    [autoClose]="'outside'" (dateSelect)="onDateSelection($event)" [displayMonths]="2" [dayTemplate]="t"
                    outsideDays="hidden" [startDate]="fromDate!" tabindex="-1" [minDate]="minDate" autocomplete="off" />

                <ng-template #t let-date let-focused="focused">
                    <span class="custom-day" [class.focused]="focused" [class.range]="isRange(date)"
                        [class.faded]="isHovered(date) || isInside(date)" (mouseenter)="hoveredDate = date"
                        (mouseleave)="hoveredDate = null">
                        {{ date.day }}
                    </span>
                </ng-template>
            </div>
        </div>

        <div class="input-group w-100">
            <input #datepickerRange name="datepickerRange" class="form-control" [placeholder]="placeholder"
                [(ngModel)]="_selectedDate" autocomplete="off" (blur)="onDateBlur()" />
            <button class="mdi mdi-calendar search-icon input-group-text bg-body" (click)="datepicker.toggle()"
                type="button">
            </button>
        </div>
    </div>
</form>
