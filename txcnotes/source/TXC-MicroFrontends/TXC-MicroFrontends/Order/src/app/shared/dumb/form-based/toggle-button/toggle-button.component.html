<div class="row">
    <div class="col-12">
        <label class="form-label" [for]="toggleButtonModel.formControlName">{{ toggleButtonModel.label | standardCase }} <span *ngIf="toggleButtonModel.required" class="text-danger">*</span></label>
        <div class="form-check form-switch mt-1">
            <input type="checkbox" [id]="toggleButtonModel.formControlName" 
                [name]="toggleButtonModel.formControlName" [(ngModel)]="value"
                class="form-check-input" [class]="{'invalid-input': controlDir.control?.touched && !controlDir.control?.valid }"
                (input)="onChange(!value)" (blur)="onTouched(); blur.emit()" [disabled]="disabled">
        </div>
        <!-- // put error here -->
    </div>
</div>
