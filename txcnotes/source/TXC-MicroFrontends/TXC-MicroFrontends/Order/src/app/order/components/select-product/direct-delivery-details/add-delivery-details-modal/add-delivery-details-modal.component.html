<div class="modal-body mt-2">
  <div class="row">
    <span class="text-center text-dark font-18 bold">
      Add delivery details
    </span>
  </div>

  <div class="row mt-3 m-2 text-secondary font-14">
    <div class="col-12 d-flex justify-content-center mb-1">
      <div [formGroup]="deliveryDetailsFormGroup" class="col-12">
        <app-form [formModel]="addDeliveryDetailsFormModel" [hideTitle]="true">
          <ng-container #subField subField>
            <app-textbox
              [textBoxModel]="contactInfoEmailAddressModel"
              formControlName="contactInfoEmailAddress"
            ></app-textbox>
          </ng-container>
        </app-form>
      </div>
    </div>
    <div class="row" *ngIf="hasDuplicate">
      <div class="col-12 duplicate-error-message">
        <i class="uil-info-circle font-15" style="margin-right: 0.25rem"></i>
        The same combination had already existed in the list.
      </div>
    </div>
    <div class="row mt-2">
      <div class="col-3"></div>
      <div class="col-3">
        <button
          class="btn btn-secondary rounded-pill w-100 p-1 font-12"
          (click)="onCancel()"
        >
          Cancel
        </button>
      </div>
      <div class="col-3">
        <button
          class="btn btn-primary rounded-pill w-100 p-1 font-12"
          [disabled]="
            deliveryDetailsFormGroup.invalid ||
            hasDuplicate ||
            !deliveryDetailsFormGroup.dirty
          "
          (click)="onSave()"
        >
          Save
        </button>
      </div>
      <div class="col-3"></div>
    </div>
  </div>
</div>
