<div class="row">
  <div class="col-12">
    <label
      [class.form-label]="!datepickerModel?.style"
      [style]="datepickerModel?.style"
      >{{ datepickerModel.label }}
      <span *ngIf="datepickerModel.required" class="text-danger">*</span></label
    >
    <div class="datepicker_section">
      <input
        [owlDateTime]="owldatepickertrigger"
        [owlDateTimeTrigger]="owldatepickertrigger"
        [class]="{
          'invalid-input':
            controlDir.control?.dirty && !controlDir.control?.valid
        }"
        [(ngModel)]="value"
        [min]="minDate()"
        [placeholder]="placeholder()"
        [readonly]="true"
        class="form-control stopIssueTime_input"
        [selectMode]="datepickerModel.selectMode"
        (dateTimeChange)="dateChanged($any($event).value)"
        (dateTimeInput)="dateChanged($any($event).value)"
        (blur)="onTouched()"
        [disabled]="disabledControl"
      />
      <owl-date-time
        #owldatepickertrigger
        [startAt]="startDate"
        [hour12Timer]="true"
        [pickerType]="pickerType()"
      ></owl-date-time>
      <i class="mdi mdi-calendar timer_icon"></i>
      <a
        class="clearBtn"
        *ngIf="value && !disabledControl && isResetNeeded"
        (click)="clearDatepickerValue()"
        >Clear</a
      >
    </div>
    <div *ngIf="controlDir.control?.dirty && !controlDir.control?.valid">
      <ng-container *ngFor="let errorKey of controlErrors; let index = index">
        <small class="text-danger">
          {{ errorMessages[errorKey] }}
        </small>
      </ng-container>
    </div>
  </div>
</div>
