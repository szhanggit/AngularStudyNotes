<div class="row">
    <div class="col-12">
        <div class="form-check mt-2">
            <input type="checkbox" [id]="checkboxModel.formControlName" 
            [name]="checkboxModel.formControlName" [(ngModel)]="value"
            class="form-check-input" [class]="{'invalid-input': controlDir.control?.touched && !controlDir.control?.valid }"
            (input)="onChange(!value)" (blur)="onTouched(); blur.emit()" [disabled]="disabledControl">
            <label [for]="checkboxModel.formControlName" class="form-check-label font-14">{{ checkboxModel.label }}</label>
        </div>
        <!-- // put error here -->
    </div>
</div>
