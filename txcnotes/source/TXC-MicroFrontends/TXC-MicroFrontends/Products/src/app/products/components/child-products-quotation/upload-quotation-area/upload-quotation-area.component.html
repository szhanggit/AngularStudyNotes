<div class="p-3" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
    <h3 class="font-20 mt-0">Quotation with expiry info</h3>
    <div class="px-2">
        <app-error-message [errorMessages]="errorMessages"></app-error-message>
    </div>
    <ol class="mt-3">
        <li><a
                href="javascript:void(0)"
                class="text-decoration-underline"
                (click)="downloadTemplate($event)"
            >Download template</a> with the available quotation in the excel first and fill in the expiry info</li>
        <li>Upload the file with expiry info inputted to apply to quotation</li>
    </ol>
    <div>
        <input id="file-input" type="file" [accept]="allowedFileTypes" hidden (change)="onFileSelected($event)">
        <div class="row">
            <div class="col-6">
            <div id="file-drop-zone" class="w-100 mt-2 file-drop-zone" [class.drag-over]="dragOver"
                (click)="onFileDropZoneClick($event)">
                <ng-container *ngIf="quotationFile; else selectFile">
                    <ng-container *ngTemplateOutlet="fileUploaded"></ng-container>
                </ng-container>
            </div>
            </div>
            <div class="col-6">
            </div>
        </div>
    </div>
</div>

<ng-template #selectFile>
    <div>
        <svg-controller svgName="drop-file-or-click-to-upload"></svg-controller>
    </div>
    <span>Drop file here or click to upload</span>
</ng-template>

<ng-template #fileUploaded>
    <div>
        <svg-controller svgName="uploaded-file"></svg-controller>
    </div>
    <span>Apply child products with {{quotationFile?.name}}</span>
    <div class="flex-column text-center show-on-hover" (click)="removeFile($event)">
        <span class="font-20">
            <i class="uil-trash"></i>
        </span>
        <span class="font-14">
            Delete file
        </span>
    </div>
</ng-template>
