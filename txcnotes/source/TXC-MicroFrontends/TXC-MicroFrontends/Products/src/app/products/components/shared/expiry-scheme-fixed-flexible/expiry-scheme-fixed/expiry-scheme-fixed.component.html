<div class="modal-header border-0 pb-3">
    <div class="fs-4 fw-bolder text-dark text-center w-100 mt-2 mb-0">
        Select fixed expiry condition
    </div>
</div>

<div class="modal-body font-14 mb-3 py-0 mx-3">
    <div class="mb-3 position-relative">
        <div class="row font-12 text-left pb-2">
            <div class="col-1">
            </div>
            <div class="col-5">
                <strong>Expiry Date Type</strong>
            </div>
            <div class="col-6">
                <strong>Expiry Condition</strong>
            </div>
        </div>
        <ng-container>
            <form [formGroup]="expiryFormGroup">
                <ngx-simplebar class="item-list">
                    <div
                        *ngFor="let item of expirySchemeList; let index = index">
                        <div class="row border-top text-left py-2 align-items-center">
                            <div class="col-1 text-center">
                                <input class="form-check-input" type="radio" [name]="FIX_EXPIRY_SELECTION"
                                    [formControlName]="FIX_EXPIRY_SELECTION" [value]="item.id"
                                    (click)="onClickItem(item.id)">
                            </div>
                            <div class="col-5">
                                {{ ExpirationPolicyTypeEnum[item.type] | stringSplitByCapitalLetter }}
                            </div>

                            <div *ngIf="item.id != fixEndOfDayId else fixEndOfDayDisplay" class="col-6">
                                {{ item.displayName }}
                            </div>
                            <ng-template #fixEndOfDayDisplay>
                                <div class="col-2">
                                    {{ item.displayName }}
                                </div>
                                <div class="col-4">
                                    <div class="input-group px-2">
                                        <input type="text" class="form-control" [ngClass]="{
                                            'is-invalid': expiryFormGroup.invalid && f[FIXED_EXPIRY_DATE].dirty
                                        }" [name]="FIXED_EXPIRY_DATE" [formControlName]="FIXED_EXPIRY_DATE"
                                            ngbDatepicker #expiryDatepicker="ngbDatepicker" placeholder="MM/DD/YYYY"
                                            [minDate]="minDate" (click)="expiryDatepicker.toggle()"
                                            autoClose="'outside'">
                                        <span class="input-group-text" [ngClass]="{
                                                'border-danger': expiryFormGroup.invalid && f[FIXED_EXPIRY_DATE].dirty,
                                                'cursor-pointer': f[FIXED_EXPIRY_DATE].enabled
                                            }"
                                            (click)="f[FIXED_EXPIRY_DATE].enabled ? expiryDatepicker.toggle() : {}">
                                            <i class="mdi mdi-calendar"></i>
                                        </span>
                                    </div>
                                </div>
                            </ng-template>
                        </div>
                    </div>
                </ngx-simplebar>
            </form>
        </ng-container>
    </div>

    <div class="row">
        <div class="text-center">
            <button type="button" class="btn btn-secondary rounded-pill font-12 px-3"
                (click)="onCancel()">Cancel</button>
            <button type="button" class="btn btn-primary rounded-pill font-12 mx-2 px-3"
                (click)="onConfirm()" [disabled]="expiryFormGroup.invalid">
                Confirm
            </button>
        </div>
    </div>
</div>
