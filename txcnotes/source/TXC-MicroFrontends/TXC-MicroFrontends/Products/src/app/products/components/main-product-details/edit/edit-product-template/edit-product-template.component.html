<div class="product-details">
    <div class="row my-3">
        <div class="col-12">
            <span class="text-dark font-22"><strong>Edit Product Template & Image</strong></span>
            <ng-container *ngIf="product">
                <div class="vr font-16 mx-2"></div>
                <span class="text-secondary font-22 mx-2"><strong>{{ product.productName }}</strong></span>
            </ng-container>
        </div>
        <div class="text-info my-2 font-12" *ngIf="(loading$ | async)">Loading product template & image settings</div>
    </div>
</div>

<app-product-template *ngIf="!(this.loading$ | async)"
    [templateFormGroup]="templateFormGroup" [selectedTenant]="selectedTenant" [selectedType]="selectedType"
    [voucherNumberRuleList]="voucherNumberRuleList" 
    [emailVersionTemplateTags]="emailVersionTemplateTags"
    [smsVersionTemplateTags]="smsVersionTemplateTags" 
    [productTemplateList]="productTemplateList"
    [hideWalletImageSettings]="hideWalletImageSettings"
    [toast]="toast"
    [editMode]="true"
    (templateLanguageChanged)="OnProductTemplateLanguageChanged($event)"
    (templateLanguageRemoved)="OnProductTemplateLanguageRemoved($event)">
</app-product-template>

<div class="row my-2" *ngIf="templateFormGroup">
    <ng-container *ngIf="!showApplyTemplate; else applyTemplate">
        <div class="col-9">
        </div>
        <div class="col-3">
            <div class="row">
                <div class="col-6">
                    <button class="btn btn-secondary rounded-pill w-100 p-2 font-14"
                        (click)="navigateBackToProductDetails()">Cancel</button>
                </div>
                <div class="col-6">
                    <button class="btn btn-primary rounded-pill w-100 p-2 font-14" 
                        [disabled]="(actionLoading$ | async) || templateFormGroup.invalid || (templateFormGroup.valid && !templateFormGroup.touched)" (click)="OnSubmit()">
                        {{ (actionLoading$ | async) ? 'Loading ...' : 'Save' }}
                    </button>
                </div>
            </div>
        </div>
    </ng-container>
    <ng-template #applyTemplate>
        <div class="col-6">
        </div>
        <div class="col-6">
            <div class="row">
                <div class="col-2">
                </div>
                <div class="col-3">
                    <button class="btn btn-secondary rounded-pill w-100 p-2 font-14"
                        (click)="navigateBackToProductDetails()">Cancel</button>
                </div>
                <div class="col-4">
                    <button class="btn btn-secondary rounded-pill w-100 p-2 font-14"
                    [disabled]="(actionLoading$ | async) || templateFormGroup.invalid || (templateFormGroup.valid && !templateFormGroup.touched)" (click)="OnSubmit()">
                    {{ (actionLoading$ | async) ? 'Loading ...' : 'Save and apply to order' }}</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-primary rounded-pill w-100 p-2 font-14" 
                        [disabled]="(actionLoading$ | async) || templateFormGroup.invalid || (templateFormGroup.valid && !templateFormGroup.touched)" (click)="OnSubmit()">
                        {{ (actionLoading$ | async) ? 'Loading ...' : 'Save' }}
                    </button>
                </div>
            </div>
        </div>
    </ng-template>
</div>

<ngbd-toast-global></ngbd-toast-global>
