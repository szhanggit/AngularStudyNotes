<div class="row font-12 bold">
    <div class="col-2 text-left"></div>
    <div class="col-5 text-left">
        Expiry Date Type
    </div>
    <div class="col-5 text-left">
        Expiry Condition
    </div>
    <hr class="my-2">
</div>
<div class="row font-14" *ngFor="let expiryScheme of selectedExpirySchemes; let i = index">
    <div class="col-2 text-left">
        {{ i + 1}}
    </div>
    <div class="col-5 text-left">
        {{ expirationPolicyTypeEnum[expiryScheme.type] | stringSplitByCapitalLetter }}
    </div>
    <div class="col-5 text-left">
        {{ expiryScheme.displayName | stringSplitByCapitalLetter }}<ng-container *ngIf="fixExpiryDate">
            ({{fixExpiryDate | date: 'yyyy/MM/dd' : 'UTC'}})
        </ng-container>
    </div>
    <hr class="my-2">
</div>
