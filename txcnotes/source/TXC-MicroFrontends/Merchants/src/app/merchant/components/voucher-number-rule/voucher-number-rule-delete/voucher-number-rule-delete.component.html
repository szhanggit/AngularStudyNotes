<div class="modal-body">
    <div class="container">
        <div class="row">
            <span class="font-18 text-dark bold text-center">
                Delete voucher number rule {{ruleName ? ' ('+ruleName+')' : ''}}
            </span>
        </div>
        <div class="row mt-2">
            <span class="text-secondary text-center font-14">
                Are you sure you want to delete this voucher number rule?
            </span>
        </div>
        <div class="row mt-3">
            <div class="col-6 px-3">
                <button class="btn btn-secondary font-12 w-100 rounded-pill" (click)="activeModal.close('cancel')">
                    Cancel
                </button>
            </div>
            <div class="col-6 px-3">
                <button class="btn btn-primary font-12 w-100 rounded-pill" (click)="activeModal.close('confirm')">
                    Delete
                </button>
            </div>
        </div>
    </div>
</div>
