<div class="row mt-3">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Tenants</h4>
                <div class="row mt-3">
                    <div class="col-12">
                        <ag-grid-angular 
                            style="height: 750px"
                            class="ag-theme-alpine"
                            [columnDefs]="tenantListColDefs"
                            [rowData]="tenantList"
                            [cacheQuickFilter]="true"
                            [gridOptions]="tenantListGridOptions" 
                            (gridReady)="onGridReady($event)"
                            (firstDataRendered)="onFirstDataRendered()">
                        </ag-grid-angular>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
